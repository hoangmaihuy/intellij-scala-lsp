name: Test Launcher

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-missing-sdk:
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: 'Test: --version'
        run: |
          output=$(./launcher/scallij --version)
          echo "$output"
          echo "$output" | grep -q "scallij"

      - name: 'Test: --help'
        run: |
          output=$(./launcher/scallij --help)
          echo "$output"
          echo "$output" | grep -q "Usage: scallij"

      - name: 'Test: unknown flag rejected'
        run: |
          if ./launcher/scallij --unknown-flag 2>/dev/null; then
            echo "FAIL: unknown flag should exit non-zero"
            exit 1
          fi
          stderr=$(./launcher/scallij --unknown-flag 2>&1 || true)
          echo "$stderr"
          echo "$stderr" | grep -q "Unknown option"

      - name: 'Test: --stop with no daemon'
        run: |
          # --stop should exit 0 when no daemon is running
          ./launcher/scallij --stop 2>&1 || true

      - name: 'Test: default mode fails without SDK'
        run: |
          # Running without args (connect mode) should fail because no SDK is available
          if ./launcher/scallij 2>/dev/null; then
            echo "FAIL: should fail without SDK"
            exit 1
          fi

  test-provided-sdk:
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up sbt
        uses: sbt/setup-sbt@v1

      - name: Install socat
        run: |
          if [ "$(uname -s)" = "Darwin" ]; then
            brew install socat
          else
            sudo apt-get update && sudo apt-get install -y socat
          fi

      - name: Cache sbt and IntelliJ SDK
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/coursier
            ~/.sbt
            ~/.intellij-scala-lspPluginIC
          key: sbt-sdk-${{ runner.os }}-${{ hashFiles('build.sbt', 'project/build.properties', 'version.sbt') }}
          restore-keys: |
            sbt-sdk-${{ runner.os }}-

      - name: Download IntelliJ SDK and build JARs
        run: sbt lsp-server/packageArtifact

      - name: Find IntelliJ SDK path
        id: sdk
        run: |
          # sbt-idea-plugin downloads SDK to this location
          SDK_DIR=""
          for candidate in target/aarch64/idea/*/Contents \
                           target/idea/*/Contents \
                           target/aarch64/idea/* \
                           target/idea/*; do
            if [ -d "$candidate/lib" ]; then
              SDK_DIR="$(cd "$candidate" && pwd)"
              break
            fi
          done
          if [ -z "$SDK_DIR" ]; then
            echo "ERROR: IntelliJ SDK not found after sbt build"
            find target -name "product-info.json" 2>/dev/null || true
            exit 1
          fi
          echo "sdk_dir=$SDK_DIR" >> "$GITHUB_OUTPUT"
          echo "Found SDK: $SDK_DIR"

      - name: Pre-populate JAR cache
        run: |
          CACHE_DIR="$HOME/.cache/intellij-scala-lsp"
          mkdir -p "$CACHE_DIR/lsp-server/lib"
          cp lsp-server/target/plugin/intellij-scala-lsp/lib/*.jar "$CACHE_DIR/lsp-server/lib/"
          echo "0.0.0-test" > "$CACHE_DIR/version"

      - name: 'Test: --version'
        run: |
          output=$(./launcher/scallij --version)
          echo "$output"
          echo "$output" | grep -q "scallij"

      - name: 'Test: --help'
        run: |
          output=$(./launcher/scallij --help)
          echo "$output"
          echo "$output" | grep -q "Usage: scallij"

      - name: 'Test: unknown flag rejected'
        run: |
          if ./launcher/scallij --unknown-flag 2>/dev/null; then
            echo "FAIL: unknown flag should exit non-zero"
            exit 1
          fi
          stderr=$(./launcher/scallij --unknown-flag 2>&1 || true)
          echo "$stderr"
          echo "$stderr" | grep -q "Unknown option"

      - name: 'Test: --install (uses sbt SDK, skips JARs)'
        env:
          INTELLIJ_HOME: ${{ steps.sdk.outputs.sdk_dir }}
        run: |
          output=$(./launcher/scallij --install 2>&1)
          echo "$output"
          echo "$output" | grep -q "skipping JAR download"
          echo "$output" | grep -q "IntelliJ: $INTELLIJ_HOME"

      - name: 'Test: --dev starts daemon'
        run: |
          ./launcher/scallij --dev &
          DAEMON_PID=$!
          # Wait for port file
          for i in $(seq 1 120); do
            if [ -f "$HOME/.cache/intellij-scala-lsp/daemon.port" ]; then
              echo "Daemon started on port $(cat "$HOME/.cache/intellij-scala-lsp/daemon.port")"
              break
            fi
            sleep 1
          done
          if [ ! -f "$HOME/.cache/intellij-scala-lsp/daemon.port" ]; then
            echo "FAIL: daemon did not start within 120s"
            cat "$HOME/.cache/intellij-scala-lsp/lsp-server.log" 2>/dev/null || true
            exit 1
          fi

      - name: 'Test: --list-projects'
        run: ./launcher/scallij --list-projects

      - name: 'Test: --stop'
        run: |
          output=$(./launcher/scallij --stop 2>&1)
          echo "$output"
          echo "$output" | grep -q "Daemon stopped"

      - name: 'Verify: used sbt SDK (not downloaded)'
        env:
          INTELLIJ_HOME: ${{ steps.sdk.outputs.sdk_dir }}
        run: |
          LOG="$HOME/.cache/intellij-scala-lsp/lsp-server.log"
          if [ -f "$LOG" ]; then
            cat "$LOG"
          fi
