name: Test Launcher

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-missing-sdk:
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up sbt
        uses: sbt/setup-sbt@v1

      - name: Install socat
        run: |
          if [ "$(uname -s)" = "Darwin" ]; then
            brew install socat
          else
            sudo apt-get update && sudo apt-get install -y socat
          fi

      - name: Build LSP server JARs
        run: sbt lsp-server/packageArtifact

      - name: Pre-populate JAR cache
        run: |
          CACHE_DIR="$HOME/.cache/intellij-scala-lsp"
          mkdir -p "$CACHE_DIR/lsp-server/lib"
          cp lsp-server/target/plugin/intellij-scala-lsp/lib/*.jar "$CACHE_DIR/lsp-server/lib/"
          echo "0.0.0-test" > "$CACHE_DIR/version"

      - name: 'Test: --version'
        run: |
          output=$(./launcher/scallij --version)
          echo "$output"
          echo "$output" | grep -q "scallij"

      - name: 'Test: --help'
        run: |
          output=$(./launcher/scallij --help)
          echo "$output"
          echo "$output" | grep -q "Usage: scallij"

      - name: 'Test: unknown flag rejected'
        run: |
          if ./launcher/scallij --unknown-flag 2>/dev/null; then
            echo "FAIL: unknown flag should exit non-zero"
            exit 1
          fi
          stderr=$(./launcher/scallij --unknown-flag 2>&1 || true)
          echo "$stderr"
          echo "$stderr" | grep -q "Unknown option"

      - name: 'Test: --stop with no daemon'
        run: |
          output=$(./launcher/scallij --stop 2>&1)
          echo "$output"
          echo "$output" | grep -q "No daemon running"

      - name: Cache IntelliJ SDK
        uses: actions/cache@v4
        with:
          path: ~/.cache/intellij-scala-lsp/sdk
          key: intellij-sdk-missing-${{ runner.os }}-${{ hashFiles('launcher/scallij') }}

      - name: 'Test: --install (downloads SDK, skips JARs)'
        run: |
          output=$(./launcher/scallij --install 2>&1)
          echo "$output"
          echo "$output" | grep -q "skipping JAR download"
          echo "$output" | grep -q "IntelliJ:"

      - name: 'Test: --daemon starts'
        run: |
          ./launcher/scallij --daemon &
          DAEMON_PID=$!
          # Wait for port file
          for i in $(seq 1 120); do
            if [ -f "$HOME/.cache/intellij-scala-lsp/daemon.port" ]; then
              echo "Daemon started on port $(cat "$HOME/.cache/intellij-scala-lsp/daemon.port")"
              break
            fi
            sleep 1
          done
          if [ ! -f "$HOME/.cache/intellij-scala-lsp/daemon.port" ]; then
            echo "FAIL: daemon did not start within 120s"
            cat "$HOME/.cache/intellij-scala-lsp/lsp-server.log" || true
            exit 1
          fi

      - name: 'Test: --list-projects'
        run: ./launcher/scallij --list-projects

      - name: 'Test: --stop'
        run: |
          output=$(./launcher/scallij --stop 2>&1)
          echo "$output"
          echo "$output" | grep -q "Daemon stopped"

  test-provided-sdk:
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up sbt
        uses: sbt/setup-sbt@v1

      - name: Install socat
        run: |
          if [ "$(uname -s)" = "Darwin" ]; then
            brew install socat
          else
            sudo apt-get update && sudo apt-get install -y socat
          fi

      - name: Build LSP server JARs
        run: sbt lsp-server/packageArtifact

      - name: Pre-populate JAR cache
        run: |
          CACHE_DIR="$HOME/.cache/intellij-scala-lsp"
          mkdir -p "$CACHE_DIR/lsp-server/lib"
          cp lsp-server/target/plugin/intellij-scala-lsp/lib/*.jar "$CACHE_DIR/lsp-server/lib/"
          echo "0.0.0-test" > "$CACHE_DIR/version"

      - name: Read IntelliJ version from launcher
        id: versions
        run: |
          IJ_VERSION=$(grep '^INTELLIJ_VERSION=' launcher/scallij | cut -d'"' -f2)
          IJ_BUILD=$(grep '^INTELLIJ_BUILD=' launcher/scallij | cut -d'"' -f2)
          echo "ij_version=$IJ_VERSION" >> "$GITHUB_OUTPUT"
          echo "ij_build=$IJ_BUILD" >> "$GITHUB_OUTPUT"
          echo "IntelliJ version: $IJ_VERSION, build: $IJ_BUILD"

      - name: Cache IntelliJ SDK
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: ~/intellij-sdk
          key: intellij-sdk-provided-${{ runner.os }}-${{ steps.versions.outputs.ij_build }}

      - name: Download IntelliJ SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          IJ_VERSION="${{ steps.versions.outputs.ij_version }}"
          mkdir -p ~/intellij-sdk
          if [ "$(uname -s)" = "Darwin" ]; then
            if [ "$(uname -m)" = "arm64" ]; then
              URL="https://download.jetbrains.com/idea/ideaIC-${IJ_VERSION}-aarch64.tar.gz"
            else
              URL="https://download.jetbrains.com/idea/ideaIC-${IJ_VERSION}.tar.gz"
            fi
          else
            if [ "$(uname -m)" = "aarch64" ]; then
              URL="https://download.jetbrains.com/idea/ideaIC-${IJ_VERSION}-aarch64.tar.gz"
            else
              URL="https://download.jetbrains.com/idea/ideaIC-${IJ_VERSION}.tar.gz"
            fi
          fi
          echo "Downloading: $URL"
          curl -fSL --progress-bar -o /tmp/idea.tar.gz "$URL"
          tar xzf /tmp/idea.tar.gz -C ~/intellij-sdk --strip-components=1
          rm /tmp/idea.tar.gz

      - name: Set INTELLIJ_HOME
        run: |
          if [ "$(uname -s)" = "Darwin" ]; then
            # macOS tarball extracts to Contents/ structure
            if [ -d ~/intellij-sdk/Contents/lib ]; then
              echo "INTELLIJ_HOME=$HOME/intellij-sdk/Contents" >> "$GITHUB_ENV"
            else
              echo "INTELLIJ_HOME=$HOME/intellij-sdk" >> "$GITHUB_ENV"
            fi
          else
            echo "INTELLIJ_HOME=$HOME/intellij-sdk" >> "$GITHUB_ENV"
          fi

      - name: 'Test: --version'
        run: |
          output=$(./launcher/scallij --version)
          echo "$output"
          echo "$output" | grep -q "scallij"

      - name: 'Test: --help'
        run: |
          output=$(./launcher/scallij --help)
          echo "$output"
          echo "$output" | grep -q "Usage: scallij"

      - name: 'Test: unknown flag rejected'
        run: |
          if ./launcher/scallij --unknown-flag 2>/dev/null; then
            echo "FAIL: unknown flag should exit non-zero"
            exit 1
          fi
          stderr=$(./launcher/scallij --unknown-flag 2>&1 || true)
          echo "$stderr"
          echo "$stderr" | grep -q "Unknown option"

      - name: 'Test: --stop with no daemon'
        run: |
          output=$(./launcher/scallij --stop 2>&1)
          echo "$output"
          echo "$output" | grep -q "No daemon running"

      - name: 'Test: --install (uses provided SDK, skips JARs)'
        run: |
          output=$(./launcher/scallij --install 2>&1)
          echo "$output"
          echo "$output" | grep -q "skipping JAR download"
          echo "$output" | grep -q "IntelliJ: $INTELLIJ_HOME"

      - name: 'Test: --daemon starts'
        run: |
          ./launcher/scallij --daemon &
          DAEMON_PID=$!
          for i in $(seq 1 120); do
            if [ -f "$HOME/.cache/intellij-scala-lsp/daemon.port" ]; then
              echo "Daemon started on port $(cat "$HOME/.cache/intellij-scala-lsp/daemon.port")"
              break
            fi
            sleep 1
          done
          if [ ! -f "$HOME/.cache/intellij-scala-lsp/daemon.port" ]; then
            echo "FAIL: daemon did not start within 120s"
            cat "$HOME/.cache/intellij-scala-lsp/lsp-server.log" || true
            exit 1
          fi

      - name: 'Test: --list-projects'
        run: ./launcher/scallij --list-projects

      - name: 'Test: --stop'
        run: |
          output=$(./launcher/scallij --stop 2>&1)
          echo "$output"
          echo "$output" | grep -q "Daemon stopped"

      - name: 'Verify: used provided SDK (not downloaded)'
        run: |
          LOG="$HOME/.cache/intellij-scala-lsp/lsp-server.log"
          if [ -f "$LOG" ]; then
            cat "$LOG"
            grep -q "IntelliJ: $INTELLIJ_HOME" "$LOG" || {
              echo "FAIL: daemon did not use provided INTELLIJ_HOME"
              exit 1
            }
          fi
