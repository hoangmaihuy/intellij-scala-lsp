name: Test Launcher

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-launcher:
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up sbt
        uses: sbt/setup-sbt@v1

      - name: Install socat
        run: |
          if [ "$(uname -s)" = "Darwin" ]; then
            brew install socat
          else
            sudo apt-get update && sudo apt-get install -y socat
          fi

      - name: Cache sbt and IntelliJ SDK
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/coursier
            ~/.sbt
            ~/.intellij-scala-lspPluginIC
          key: sbt-sdk-${{ runner.os }}-${{ hashFiles('build.sbt', 'project/build.properties', 'version.sbt') }}
          restore-keys: |
            sbt-sdk-${{ runner.os }}-

      - name: Download IntelliJ SDK and build JARs
        run: sbt lsp-server/packageArtifact

      - name: Pre-populate JAR cache
        run: |
          CACHE_DIR="$HOME/.cache/intellij-scala-lsp"
          mkdir -p "$CACHE_DIR/lsp-server/lib"
          cp lsp-server/target/plugin/intellij-scala-lsp/lib/*.jar "$CACHE_DIR/lsp-server/lib/"
          echo "0.0.0-test" > "$CACHE_DIR/version"

      - name: Find sbt SDK path for INTELLIJ_HOME
        id: sdk
        run: |
          # sbt-idea-plugin downloads SDK to ~/.intellij-scala-lspPluginIC/sdk/<build>/
          IJ_BUILD=$(grep '^INTELLIJ_BUILD=' launcher/scallij | cut -d'"' -f2)
          SDK_BASE="$HOME/.intellij-scala-lspPluginIC/sdk/$IJ_BUILD"
          # On macOS, the SDK has a Contents/ subdirectory
          if [ -d "$SDK_BASE/Contents/lib" ]; then
            SDK_DIR="$SDK_BASE/Contents"
          elif [ -d "$SDK_BASE/lib" ]; then
            SDK_DIR="$SDK_BASE"
          else
            echo "ERROR: IntelliJ SDK not found at $SDK_BASE"
            ls -la "$HOME/.intellij-scala-lspPluginIC/sdk/" 2>/dev/null || true
            exit 1
          fi
          echo "sdk_dir=$SDK_DIR" >> "$GITHUB_OUTPUT"
          echo "Found SDK: $SDK_DIR"

      - name: 'Test: --version'
        run: |
          output=$(./launcher/scallij --version)
          echo "$output"
          echo "$output" | grep -q "scallij"

      - name: 'Test: --help'
        run: |
          output=$(./launcher/scallij --help)
          echo "$output"
          echo "$output" | grep -q "Usage: scallij"

      - name: 'Test: unknown flag rejected'
        run: |
          if ./launcher/scallij --unknown-flag 2>/dev/null; then
            echo "FAIL: unknown flag should exit non-zero"
            exit 1
          fi
          stderr=$(./launcher/scallij --unknown-flag 2>&1 || true)
          echo "$stderr"
          echo "$stderr" | grep -q "Unknown option"

      - name: 'Test: --install (uses sbt SDK, skips JARs)'
        env:
          INTELLIJ_HOME: ${{ steps.sdk.outputs.sdk_dir }}
        run: |
          output=$(./launcher/scallij --install 2>&1)
          echo "$output"
          echo "$output" | grep -q "skipping JAR download"
          echo "$output" | grep -q "IntelliJ:"

      - name: 'Test: --dev starts daemon'
        run: |
          ./launcher/scallij --dev &
          # Wait for port file
          for i in $(seq 1 120); do
            if [ -f "$HOME/.cache/intellij-scala-lsp/daemon.port" ]; then
              echo "Daemon started on port $(cat "$HOME/.cache/intellij-scala-lsp/daemon.port")"
              break
            fi
            sleep 1
          done
          if [ ! -f "$HOME/.cache/intellij-scala-lsp/daemon.port" ]; then
            echo "FAIL: daemon did not start within 120s"
            cat "$HOME/.cache/intellij-scala-lsp/lsp-server.log" 2>/dev/null || true
            exit 1
          fi

      - name: 'Test: --list-projects'
        run: ./launcher/scallij --list-projects

      - name: 'Test: --stop'
        run: |
          # --stop exits 0 when daemon is running and gets killed
          ./launcher/scallij --stop
          # Verify daemon is actually gone
          sleep 2
          if [ -f "$HOME/.cache/intellij-scala-lsp/daemon.port" ]; then
            echo "FAIL: daemon.port still exists after --stop"
            exit 1
          fi
